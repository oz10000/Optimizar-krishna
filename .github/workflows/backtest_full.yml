name: Backtest Completo con Datos OKX

on:
  schedule:
    - cron: "0 6 * * *"   # Todos los días a las 06:00 UTC
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar backtest completo
        run: python run_backtest_full.py

      - name: Subir resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ github.run_id }}
          path: |
            backtest_results/
            data/candles_5m/
          retention-days: 30
